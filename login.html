<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Acolhedora - Entrar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ── Reset e Variáveis do Novo App ── */
        :root {
            --cor-fundo: #FAF7F2;
            --cor-primaria: #9B8EAD;
            --cor-texto: #4A4453;
            --cor-branco: #FFFFFF;
            --tamanho-base: 16px;
        }

        body.alto-contraste {
            --cor-fundo: #2A2E35;
            --cor-primaria: #83A598;
            --cor-texto: #E2E8F0;
            --cor-branco: #3B4252;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-size: var(--tamanho-base);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ── Acessibilidade ── */
        .barra-acessibilidade {
            background-color: var(--cor-primaria);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .barra-acessibilidade span {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .controles-acess button {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            margin-left: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        .controles-acess button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ── Estrutura da Página ── */
        .pagina {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .marca {
            text-align: center;
            margin-bottom: 32px;
        }

        .marca-icone {
            width: 64px;
            height: 64px;
            background-color: var(--cor-primaria);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .marca h1 {
            font-size: 1.8rem;
            color: var(--cor-primaria);
            margin-bottom: 4px;
        }

        .marca p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* ── Formulário e Card ── */
        .card-form {
            background: var(--cor-branco);
            border-radius: 10px;
            padding: 36px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .card-form h2 {
            font-size: 1.4rem;
            margin-bottom: 4px;
            color: var(--cor-primaria);
        }

        .card-form .subtitulo {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 24px;
        }

        .campo {
            margin-bottom: 16px;
        }

        .campo label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .campo-wrapper {
            position: relative;
        }

        .campo-wrapper i.ic {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cor-texto);
            opacity: 0.5;
            font-size: 0.9rem;
        }

        .campo input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid var(--cor-primaria);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--cor-texto);
            background: var(--cor-branco);
            outline: none;
            transition: all 0.2s;
        }

        body.alto-contraste .campo input {
            background: var(--cor-fundo);
            border-color: var(--cor-primaria);
            color: var(--cor-texto);
        }

        .campo input:focus {
            box-shadow: 0 0 0 2px var(--cor-primaria);
        }

        .campo input::placeholder {
            opacity: 0.5;
        }

        .toggle-senha {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--cor-texto);
            opacity: 0.6;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0;
        }

        .linha-senha {
            display: flex;
            justify-content: flex-end;
            margin-top: -8px;
            margin-bottom: 20px;
        }

        .linha-senha a {
            font-size: 0.85rem;
            color: var(--cor-primaria);
            text-decoration: none;
            font-weight: bold;
        }

        .linha-senha a:hover {
            text-decoration: underline;
        }

        /* ── Botões ── */
        .btn-primario {
            width: 100%;
            padding: 14px;
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primario:hover {
            opacity: 0.9;
        }

        .btn-primario:active {
            transform: scale(0.98);
        }

        .divisor {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divisor hr {
            flex: 1;
            border: none;
            border-top: 1px solid var(--cor-primaria);
            opacity: 0.2;
        }

        .divisor span {
            font-size: 0.85rem;
            color: var(--cor-texto);
            opacity: 0.7;
        }

        .btn-social {
            width: 100%;
            padding: 12px;
            background: var(--cor-fundo);
            border: 1.5px solid var(--cor-primaria);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--cor-texto);
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .btn-social:hover {
            background: var(--cor-primaria);
            color: white;
        }

        .rodape-card {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .rodape-card a {
            color: var(--cor-primaria);
            text-decoration: none;
            font-weight: bold;
        }

        /* ── Mensagens de Erro ── */
        .msg-erro {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #dc2626;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .msg-erro.visivel {
            display: flex;
        }

        body.alto-contraste .msg-erro {
            background: #3d1515;
            border-color: #7f1d1d;
            color: #fca5a5;
        }

        /* ── Spinner ── */
        .btn-primario .spinner {
            display: none;
        }

        .btn-primario.carregando .texto-btn {
            display: none;
        }

        .btn-primario.carregando .spinner {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes girar {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner i {
            animation: girar 0.8s linear infinite;
        }

        @media (max-width: 440px) {
            .card-form {
                padding: 28px 18px;
            }
        }
    </style>
</head>

<body>

    <script src="Auth.js"></script>

    <script>
        // Verificação simples usando o localStorage do navegador
        if (localStorage.getItem('usuarioLogado') === 'true') {
            window.location.href = 'index.html';
        }
    </script>

    <div class="barra-acessibilidade">
        <span><i class="fa-solid fa-heart-pulse"></i> Mente Acolhedora</span>
        <div class="controles-acess">
            <button id="btn-aumentar-fonte">A+</button>
            <button id="btn-diminuir-fonte">A-</button>
            <button id="btn-alto-contraste"><i class="fa-solid fa-circle-half-stroke"></i></button>
        </div>
    </div>

    <div class="pagina">
        <div class="marca">
            <div class="marca-icone"><i class="fa-solid fa-leaf"></i></div>
            <h1>Mente Acolhedora</h1>
            <p>Cuidado para quem cuida de si</p>
        </div>

        <div class="card-form">
            <h2>Bem-vindo de volta</h2>
            <p class="subtitulo">Entre na sua conta para continuar</p>

            <div class="msg-erro" id="msg-erro">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="msg-erro-texto"></span>
            </div>

            <div class="campo">
                <label for="usuario">Usuário</label>
                <div class="campo-wrapper">
                    <i class="fa-regular fa-user ic"></i>
                    <input type="text" id="usuario" placeholder="admin" autocomplete="username">
                </div>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <div class="campo-wrapper">
                    <i class="fa-solid fa-lock ic"></i>
                    <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
                    <button class="toggle-senha" id="toggle-senha" type="button" aria-label="Mostrar senha">
                        <i class="fa-regular fa-eye" id="icone-senha"></i>
                    </button>
                </div>
            </div>

            <div class="linha-senha"><a href="#">Esqueceu a senha?</a></div>

            <button class="btn-primario" id="btn-entrar" type="button">
                <span class="texto-btn"><i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar</span>
                <span class="spinner"><i class="fa-solid fa-circle-notch"></i> Entrando...</span>
            </button>

            <div class="divisor">
                <hr><span>ou</span>
                <hr>
            </div>

            <button class="btn-social" type="button">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path
                        d="M43.611 20.083H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"
                        fill="#FFC107" />
                    <path
                        d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"
                        fill="#FF3D00" />
                    <path
                        d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
                        fill="#4CAF50" />
                    <path
                        d="M43.611 20.083H24v8h11.303a12.04 12.04 0 01-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"
                        fill="#1976D2" />
                </svg>
                Entrar com Google
            </button>

            <p class="rodape-card">Não tem conta? <a href="cadastro.html">Criar conta grátis</a></p>
        </div>
    </div>

    <script>
        // Configurações de segurança e credenciais fixas para apresentação
        const MAX_INTENTOS = 3;
        let intentos = 0;

        const USUARIO_VALIDO = 'admin';
        const SENHA_VALIDA = '1234';

        // ── Acessibilidade ──
        let tam = 16;
        document.getElementById('btn-aumentar-fonte').onclick = () => {
            if (tam < 24) {
                tam += 2;
                document.documentElement.style.setProperty('--tamanho-base', tam + 'px');
            }
        };
        document.getElementById('btn-diminuir-fonte').onclick = () => {
            if (tam > 14) {
                tam -= 2;
                document.documentElement.style.setProperty('--tamanho-base', tam + 'px');
            }
        };
        document.getElementById('btn-alto-contraste').onclick = () => document.body.classList.toggle('alto-contraste');

        // ── Toggle mostrar senha ──
        document.getElementById('toggle-senha').onclick = function () {
            const inp = document.getElementById('senha');
            const ic = document.getElementById('icone-senha');
            const mostrar = inp.type === 'password';
            inp.type = mostrar ? 'text' : 'password';
            ic.className = mostrar ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
        };

        // ── Lógica de Login Simplificada ──
        function tentarLogin() {
            const usuarioInput = document.getElementById('usuario').value.trim();
            const senhaInput = document.getElementById('senha').value;
            const erroEl = document.getElementById('msg-erro');
            const btn = document.getElementById('btn-entrar');

            erroEl.classList.remove('visivel');

            if (intentos >= MAX_INTENTOS) {
                document.getElementById('msg-erro-texto').textContent = "Conta bloqueada. Muitas tentativas.";
                erroEl.classList.add('visivel');
                return;
            }

            if (!usuarioInput || !senhaInput) {
                document.getElementById('msg-erro-texto').textContent = 'Preencha o usuário e a senha.';
                erroEl.classList.add('visivel');
                return;
            }

            btn.classList.add('carregando');

            // Pequeno delay para simular carregamento da internet (melhora a experiência)
            setTimeout(() => {
                btn.classList.remove('carregando');

                // Verifica se bate com as constantes fixas
                if (usuarioInput === USUARIO_VALIDO && senhaInput === SENHA_VALIDA) {
                    // Salva estado de logado e redireciona
                    localStorage.setItem('usuarioLogado', 'true');
                    window.location.href = 'index.html';
                } else {
                    intentos++;
                    document.getElementById('msg-erro-texto').textContent = "Usuário ou senha incorretos.";
                    erroEl.classList.add('visivel');
                }
            }, 600);
        }

        document.getElementById('btn-entrar').onclick = tentarLogin;

        // Permite logar apertando "Enter"
        ['usuario', 'senha'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => {
                if (e.key === 'Enter') tentarLogin();
            });
        });
    </script>
</body>

</html>
